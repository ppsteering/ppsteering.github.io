<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PPS rollout vs. steering strength &amp; input noise</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500&family=STIX+Two+Text:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
<style>
  body {
    --font-original: 'Inter','Helvetica Neue',Arial,sans-serif;
    --font-mono: 'Roboto Mono', ui-monospace, monospace;
    --font-math: 'STIX Two Text','Latin Modern Math','Cambria Math',Georgia,'Times New Roman',serif;
    --bg: #fdfaf4; --panel: #fffdf8; --ink: #1b1b1b; --sub: #6b6453;
    --line: #e4dcc8; --soft: #efece4; --resid: #e0863a;
    --shadow: 0 1px 2px rgba(40,32,16,0.05);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: var(--bg); color: var(--ink); font-family: var(--font-original);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 22px 26px 36px; }
  .m { font-family: var(--font-math); }
  .m i { font-style: italic; font-weight: 700; }
  .m sub { font-style: normal; font-weight: 400; }

  .module { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    box-shadow: var(--shadow); padding: 20px 20px 22px; display: flex; flex-direction: column; gap: 16px; }
  /* Four rollouts shown in parallel (capsule + fruit + tea + egg), sharing the
     strength slider + input-noise buttons + legend. */
  .vidrow { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  @media (max-width: 540px) { .vidrow { grid-template-columns: 1fr 1fr; } }

  /* Panels share one aspect (768/518); the taller 4:3 fruit clip is cover-fit. */
  .vidwrap { position: relative; line-height: 0; background: var(--bg); border: 1px solid var(--line);
    border-radius: 8px; overflow: hidden; aspect-ratio: 768 / 518; }
  /* Subtask label overlaid on the rollout, top-left. */
  .vidwrap .vidtask { position: absolute; top: 14px; left: 14px; z-index: 4;
    font: 700 15px/1 var(--font-original); color: #fff;
    background: rgba(27, 27, 27, 0.7); padding: 6px 12px; border-radius: 8px;
    letter-spacing: 0; pointer-events: none; }
  /* Outcome badge, bottom-right — green ✓ success / red ✗ failure. */
  .vidwrap .vidout { position: absolute; bottom: 14px; right: 14px; z-index: 4;
    display: inline-flex; align-items: center; gap: 7px; max-width: 84%;
    font: 700 15px/1 var(--font-original); text-align: right;
    background: rgba(27, 27, 27, 0.7); padding: 6px 12px; border-radius: 8px;
    letter-spacing: 0; pointer-events: none; }
  .vidwrap .vidout svg { width: 15px; height: 15px; flex: 0 0 auto; display: block; }
  .vidwrap .vidout.ok  { color: #5fd07a; }
  .vidwrap .vidout.bad { color: #f0846a; }
  .vidwrap .vidout.mid { color: #f4d35e; }
  .vidwrap .vidout .vo-mark { font: 800 15px/1 var(--font-original); letter-spacing: -1.5px; }
  /* Poster (first frame) + video stacked; the poster covers the reload gap
     while changing γ / noise so there's no black flash. */
  .vidwrap video, .vidwrap img.poster {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .vidwrap img.poster { z-index: 1; }
  .vidwrap video { z-index: 2; opacity: 0; transition: opacity .12s ease; }
  .vidwrap.playing video { opacity: 1; }

  /* Input-noise selector: 5 buttons (1–5) shared across all panels. */
  .noise-ctl { display: flex; align-items: center; justify-content: center; gap: 12px;
    flex-wrap: wrap; margin: 2px 0 0; }
  .noise-ctl .k { font-family: var(--font-original); font-size: 18px; font-weight: 600; color: var(--ink); }
  .noise-ctl .k .m { font-weight: 600; }
  .noise-btns { display: inline-flex; gap: 6px; }
  .noise-btns button { font: 600 15px/1 var(--font-original); color: var(--sub);
    background: var(--soft); border: 1px solid var(--line); border-radius: 8px;
    width: 36px; height: 32px; cursor: pointer; transition: background .12s ease, color .12s ease, border-color .12s ease; }
  .noise-btns button:hover { border-color: var(--resid); color: var(--ink); }
  .noise-btns button.on { background: var(--resid); border-color: var(--resid); color: #fff; }

  .ctl-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .ctl-label .k { font-family: var(--font-original); font-size: 18px; font-weight: 600; }
  .ctl-label .v { font-family: var(--font-original); font-size: 18px; color: var(--resid); font-weight: 500; }
  input[type=range] { -webkit-appearance: none; appearance: none; width: calc(100% - 56px); height: 4px;
    background: var(--line); border-radius: 99px; outline: none; margin: 6px auto 2px; display: block; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 50%; background: var(--resid);
    border: 3px solid var(--panel); box-shadow: var(--shadow); cursor: pointer; }
  input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%;
    background: var(--resid); border: 3px solid var(--panel); cursor: pointer; }

  /* Trajectory-colour legend (base / ref / task / PPS). */
  .teaser-legend {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 10px 40px; margin-top: 6px;
    font-family: var(--font-original); font-size: 18px; color: var(--sub);
  }
  .teaser-legend .leg-item { display: inline-flex; align-items: center; gap: 9px; }
  .teaser-legend .leg-swatch { display: inline-block; width: 30px; height: 3px; border-radius: 2px; }

  /* γ slider "Try me" hint — pill sits BELOW the bar, arrow pointing up. */
  .gamma-wrap { position: relative; margin: 22px 0 22px; }
  .gamma-hint { position:absolute; top:calc(100% + 6px); z-index:6; transform:translateX(-50%);
    display:inline-flex; align-items:center; gap:6px; padding:5px 11px 5px 9px; border-radius:999px;
    white-space:nowrap; pointer-events:none; font:600 12px/1 var(--font-original);
    background:#fffdf8; color:#3f8f5a; border:1.5px solid #4f9d5d; box-shadow:0 4px 12px rgba(40,32,16,.14); opacity:0; }
  .gamma-hint .gh-cursor { width:13px; height:13px; flex:0 0 auto; color:#4f9d5d; }
  .gamma-hint::after { content:''; position:absolute; bottom:100%; left:50%; margin-left:-5px; border:5px solid transparent; border-bottom-color:#4f9d5d; }
  .gamma-hint.show { opacity:1; }
  @keyframes gh-bob { 0%,100%{ transform:translateX(calc(-50% - 5px)); } 50%{ transform:translateX(calc(-50% + 5px)); } }
  .gamma-hint.show.gh-bob { animation: gh-bob 1.5s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) { .gamma-hint.gh-bob { animation:none; } }

  html.pps-embedded, body.embed { background: transparent; }
  body.embed .wrap { padding: 0; max-width: none; }
</style>
</head>
<body data-theme="a">
  <div class="wrap">
    <div class="module">
      <div class="vidrow">
        <div class="vidwrap" data-dir="capsule">
          <img class="poster" src="../steering_strength/capsule/0_0.3.jpg" alt="" aria-hidden="true">
          <video muted loop playsinline preload="auto"
                 src="../steering_strength/capsule/0_0.3.mp4"
                 aria-label="Capsule rollout at the current steering strength and input noise"></video>
          <span class="vidtask">Open the lid</span>
          <span class="vidout"></span>
        </div>
        <div class="vidwrap" data-dir="fruit">
          <img class="poster" src="../steering_strength/fruit/0_0.3.jpg" alt="" aria-hidden="true">
          <video muted loop playsinline preload="auto"
                 src="../steering_strength/fruit/0_0.3.mp4"
                 aria-label="Fruit rollout at the current steering strength and input noise"></video>
          <span class="vidtask">Pick up the pear</span>
          <span class="vidout"></span>
        </div>
        <div class="vidwrap" data-dir="tea">
          <img class="poster" src="../steering_strength/tea/0_0.3.jpg" alt="" aria-hidden="true">
          <video muted loop playsinline preload="auto"
                 src="../steering_strength/tea/0_0.3.mp4"
                 aria-label="Tea rollout at the current steering strength and input noise"></video>
          <span class="vidtask">Pick up the teapot</span>
          <span class="vidout"></span>
        </div>
        <div class="vidwrap" data-dir="pot">
          <img class="poster" src="../steering_strength/pot/0_0.3.jpg" alt="" aria-hidden="true">
          <video muted loop playsinline preload="auto"
                 src="../steering_strength/pot/0_0.3.mp4"
                 aria-label="Egg rollout at the current steering strength and input noise"></video>
          <span class="vidtask">Pick up the egg</span>
          <span class="vidout"></span>
        </div>
      </div>
      <div class="noise-ctl">
        <span class="k">Input noise</span>
        <div class="noise-btns" id="noise-btns" role="group" aria-label="Input noise sample">
          <button type="button" data-noise="0" class="on">1</button>
          <button type="button" data-noise="1">2</button>
          <button type="button" data-noise="2">3</button>
          <button type="button" data-noise="3">4</button>
          <button type="button" data-noise="4">5</button>
        </div>
      </div>
      <div>
        <div class="ctl-label"><span class="k">Steering strength <span class="m"><i>γ</i></span></span><span class="v" id="gval">0.3</span></div>
        <input id="gamma" type="range" min="0" max="1.0" step="0.01" value="0.3" />
      </div>
      <div class="teaser-legend" aria-label="Trajectory colours">
        <span class="leg-item"><span class="leg-swatch" style="background:#AF56BF"></span><span class="m"><i>&pi;</i><sub>base</sub></span>&nbsp;trajectory</span>
        <span class="leg-item"><span class="leg-swatch" style="background:#F58A45"></span><span class="m"><i>&pi;</i><sub>ref</sub></span>&nbsp;trajectory</span>
        <span class="leg-item"><span class="leg-swatch" style="background:#407CB6"></span><span class="m"><i>&pi;</i><sub>task</sub></span>&nbsp;trajectory</span>
        <span class="leg-item"><span class="leg-swatch" style="background:#4f9d5d"></span><span class="m"><i>&pi;</i><sub>PPS</sub></span>&nbsp;trajectory</span>
      </div>
    </div>
  </div>

  <script src="pps-embed.js"></script>
  <script>
    var gammaEl = document.getElementById('gamma');
    function fmt(g){ return g.toFixed(1); }

    /* Three parallel rollout sets. Each clip is keyed by input-noise sample
       (0–4, shown as buttons 1–5) and steer strength γ (0.0…1.0):
         ../steering_strength/<dir>/<noise>_<gamma>.mp4|.jpg
       The step (planning horizon) is baked in per task during encoding
       (capsule=step 2, fruit=step 1, tea=step 2). Posters cover the reload
       gap while changing γ / noise so there's no black flash. */
    var sets = Array.prototype.map.call(document.querySelectorAll('.vidwrap[data-dir]'), function (w) {
      return { wrap: w, dir: w.dataset.dir, poster: w.querySelector('img.poster'),
               video: w.querySelector('video'), out: w.querySelector('.vidout') };
    });

    /* Bottom-right outcome badge, keyed on the current γ index (0..10):
         capsule — γ≤0.1 can't open the lid (fail); γ≥0.2 opens (success).
         fruit   — γ≤0.4 opens the gripper to regrasp (success);
                   γ≥0.5 over-steers and fails to recover (fail).
         tea/pot — placeholder thresholds; refine once the outcomes are known. */
    var ICON_OK  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12.5l5 5L20 6.5"/></svg>';
    var ICON_BAD = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>';
    var ICON_MID = '<span class="vo-mark" aria-hidden="true">--</span>';   // partial outcome (yellow)
    // Base rule per task, resolved by γ index (first matching max wins).
    var OUTCOMES = {
      capsule: [ { max: 1,  cls: 'bad', txt: "Can't open the lid" },
                 { max: 10, cls: 'ok',  txt: 'Successfully open' } ],
      fruit:   [ { max: 4,  cls: 'ok',  txt: 'Open gripper to regrasp' },
                 { max: 10, cls: 'bad', txt: 'Fails to regrasp' } ],
      tea:     [ { max: 3,  cls: 'bad', txt: "Can't reach the teapot" },
                 { max: 10, cls: 'ok',  txt: 'Approach teapot' } ],
      pot:     [ { max: 5,  cls: 'bad', txt: "Can't reach the egg" },
                 { max: 10, cls: 'ok',  txt: 'Grasps the egg' } ]
    };
    // Per-(γ index, noise index) overrides, keyed "<idx>_<noise>" (noise 0-4 =
    // buttons 1-5). Take precedence over the base rule.
    function ov(cls, txt) { return { cls: cls, txt: txt }; }
    var SLIGHT = 'slightly open', REGRASP = 'Fails to regrasp', IMPRECISE = 'imprecise grasp';
    var OVERRIDES = {
      capsule: { '1_1': ov('mid', SLIGHT), '1_2': ov('mid', SLIGHT),
                 '2_0': ov('mid', SLIGHT), '2_1': ov('mid', SLIGHT), '2_3': ov('mid', SLIGHT), '2_4': ov('mid', SLIGHT),
                 '3_4': ov('mid', SLIGHT) },
      fruit:   { '2_0': ov('bad', REGRASP), '3_0': ov('bad', REGRASP), '3_3': ov('bad', REGRASP),
                 '4_0': ov('bad', REGRASP), '4_2': ov('bad', REGRASP), '4_3': ov('bad', REGRASP) },
      tea:     { '10_1': ov('mid', IMPRECISE), '10_3': ov('mid', IMPRECISE), '10_4': ov('mid', IMPRECISE) }
    };
    function updateOutcome(s, idx, noise) {
      if (!s.out) return;
      var o = (OVERRIDES[s.dir] && OVERRIDES[s.dir][idx + '_' + noise]) || null;
      if (!o) {
        var rules = OUTCOMES[s.dir] || [];
        for (var i = 0; i < rules.length; i++) { if (idx <= rules[i].max) { o = rules[i]; break; } }
      }
      if (!o) return;
      s.out.className = 'vidout ' + o.cls;
      var mark = o.cls === 'ok' ? ICON_OK : (o.cls === 'bad' ? ICON_BAD : ICON_MID);
      s.out.innerHTML = mark + '<span>' + o.txt + '</span>';
    }

    var curNoise = 0;        // 0..4 (buttons 1..5); default clip is <dir>/0_0.3
    var curIdx = 3;          // γ index (γ=0.3)
    var idleTimer = null;
    function labelFor(idx) { return (idx === 10) ? '1.0' : ('0.' + idx); }
    function clipBase(dir) { return '../steering_strength/' + dir + '/' + curNoise + '_' + labelFor(curIdx); }
    function vsrc(dir) { return clipBase(dir) + '.mp4'; }
    function psrc(dir) { return clipBase(dir) + '.jpg'; }
    function setMatchesCur(s) { return s.video.src.indexOf('/' + s.dir + '/' + curNoise + '_' + labelFor(curIdx) + '.mp4') !== -1; }

    // Load (if needed) and play one panel's rollout for the current γ + noise.
    // With autoplay removed, a freshly-swapped src must finish loading before we
    // can play it — calling play() mid-load aborts it, so defer to 'canplay'.
    function playSet(s) {
      if (setMatchesCur(s)) {
        var pr = s.video.play();
        if (pr && pr.catch) pr.catch(function () {});
        return;
      }
      s.video.src = vsrc(s.dir);
      s.video.addEventListener('canplay', function () {
        if (!setMatchesCur(s)) return;   // changed again; a later playAll covers it
        var pr = s.video.play();
        if (pr && pr.catch) pr.catch(function () {});
      }, { once: true });
      s.video.load();
    }
    function playAll() { sets.forEach(playSet); }

    // Swap every panel's poster to the current (noise, γ), hide the stale video,
    // and (debounced) auto-play once the controls have been idle `delay` ms.
    function applyState(delay) {
      sets.forEach(function (s) { s.poster.src = psrc(s.dir); s.wrap.classList.remove('playing'); });
      if (idleTimer) clearTimeout(idleTimer);
      idleTimer = setTimeout(playAll, delay);
    }

    // Reveal each panel's video (fade over poster) once it's playing + current.
    sets.forEach(function (s) {
      s.video.addEventListener('playing', function () { if (setMatchesCur(s)) s.wrap.classList.add('playing'); });
      s.video.addEventListener('loadeddata', function () { if (!s.video.paused && setMatchesCur(s)) s.wrap.classList.add('playing'); });
    });

    // Preload one noise row (all γ, all panels) so dragging swaps instantly.
    function preloadRow(noise) {
      sets.forEach(function (s) {
        for (var i = 0; i <= 10; i++) { var im = new Image(); im.src = '../steering_strength/' + s.dir + '/' + noise + '_' + labelFor(i) + '.jpg'; }
      });
    }
    preloadRow(curNoise);
    sets.forEach(function (s) { updateOutcome(s, curIdx, curNoise); });

    // Autoplay removed: hold on the poster and start the first playback 2 s
    // after load if the controls are left alone. Any change reschedules this.
    idleTimer = setTimeout(playAll, 2000);

    // γ slider: update readout always; on an index change swap clips + outcome
    // and (re)arm the 2 s idle play.
    gammaEl.addEventListener('input', function () {
      var g = parseFloat(this.value);
      var idx = Math.round(g * 10); if (idx < 0) idx = 0; else if (idx > 10) idx = 10;
      document.getElementById('gval').textContent = fmt(g);
      if (idx === curIdx) return;
      curIdx = idx;
      sets.forEach(function (s) { updateOutcome(s, idx, curNoise); });
      applyState(2000);
    });

    // Input-noise buttons (1..5 → noise 0..4), shared across all panels.
    var noiseBtns = Array.prototype.slice.call(document.querySelectorAll('#noise-btns button'));
    noiseBtns.forEach(function (b) {
      b.addEventListener('click', function () {
        var n = +b.dataset.noise;
        if (n === curNoise) return;
        curNoise = n;
        noiseBtns.forEach(function (x) { x.classList.toggle('on', +x.dataset.noise === curNoise); });
        sets.forEach(function (s) { updateOutcome(s, curIdx, curNoise); });
        preloadRow(curNoise);
        applyState(700);
      });
    });

    /* γ slider "Try me" hint: bobbing pill on the thumb + one auto-jitter that
       sweeps the 0.1–0.5 range before settling back to the default. */
    (function () {
      var wrap = document.createElement('div'); wrap.className = 'gamma-wrap';
      gammaEl.parentNode.insertBefore(wrap, gammaEl); wrap.appendChild(gammaEl);
      var pill = document.createElement('div'); pill.className = 'gamma-hint';
      pill.innerHTML = '<svg class="gh-cursor" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M5 2.5l15.5 8.2-6.6 1.6-1.9 6.6z"/></svg><span>' + ('ontouchstart' in window ? 'Drag me' : 'Try me') + '</span>';
      wrap.appendChild(pill);
      var RM = window.matchMedia('(prefers-reduced-motion: reduce)').matches, dismissed = false, wiggled = false;
      function place(){ var lo=parseFloat(gammaEl.min),hi=parseFloat(gammaEl.max),v=parseFloat(gammaEl.value),f=(v-lo)/(hi-lo),w=gammaEl.clientWidth,t=18; pill.style.left=(gammaEl.offsetLeft+t/2+f*(w-t))+'px'; }
      function show(){ place(); pill.classList.add('show'); if(!RM) pill.classList.add('gh-bob'); }
      function dismiss(){ if(dismissed)return; dismissed=true; pill.classList.remove('show','gh-bob'); }
      gammaEl.addEventListener('input', place); window.addEventListener('resize', place);
      ['pointerdown','touchstart','keydown'].forEach(function(e){ gammaEl.addEventListener(e, dismiss); });
      function applyG(g){ gammaEl.value=g.toFixed(2); gammaEl.dispatchEvent(new Event('input')); }
      function tween(a,b,d,done){ var t0=null; function s(ts){ if(dismissed)return; if(t0===null)t0=ts; var k=Math.min(1,(ts-t0)/d); var e=k<.5?2*k*k:1-Math.pow(-2*k+2,2)/2; applyG(a+(b-a)*e); if(k<1)requestAnimationFrame(s); else if(done)done(); } requestAnimationFrame(s); }
      function wiggle(){ if(wiggled||dismissed||RM)return; wiggled=true; var st=parseFloat(gammaEl.value); tween(st,0.5,820,function(){ tween(0.5,0.1,1000,function(){ tween(0.1,st,820); }); }); }
      var begun=false; function begin(){ if(begun)return; begun=true; show(); setTimeout(wiggle,750); }
      if(document.readyState==='complete') setTimeout(begin,150); else window.addEventListener('load', function(){ setTimeout(begin,150); });
    })();
  </script>
</body>
</html>
