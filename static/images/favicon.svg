<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Green 2D Gaussian</title>
  <!--
    Radial gradient approximating a 2D Gaussian with sigma ~= 0.35 of
    the radius. Stops use exp(-r^2 / (2 sigma^2)) as the alpha so the
    falloff matches a real Gaussian rather than a linear ramp. The
    green is #3CB371 (CSS MediumSeaGreen), the same shade used for the
    PPT highlight color in the paper's figures.
  -->
  <defs>
    <radialGradient id="gauss" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3CB371" stop-opacity="1.000"/>
      <stop offset="20%"  stop-color="#3CB371" stop-opacity="0.850"/>
      <stop offset="40%"  stop-color="#3CB371" stop-opacity="0.520"/>
      <stop offset="60%"  stop-color="#3CB371" stop-opacity="0.220"/>
      <stop offset="80%"  stop-color="#3CB371" stop-opacity="0.060"/>
      <stop offset="100%" stop-color="#3CB371" stop-opacity="0.000"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="32" fill="url(#gauss)"/>
</svg>
