<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>PPS 2D Gaussian distribution</title>
  <!--
    Six contour bands mirroring the "Try the steering yourself" widget's
    densityBlob style: outer (faint) drawn first, inner (saturated)
    drawn on top, so each pixel ends up at the cumulative composite
    alpha. Per-band α = peak · (1 − 0.72·(i−1)/5) with peak = 0.65, so
    the centre composite settles at ≈ 0.97 — saturated enough to read
    clearly at favicon sizes.
    Colour #4f9d5d = PAL.a.pps from pps-diagram_new.js.
  -->
  <circle cx="32" cy="32" r="30" fill="#4f9d5d" fill-opacity="0.182"/>
  <circle cx="32" cy="32" r="25" fill="#4f9d5d" fill-opacity="0.278"/>
  <circle cx="32" cy="32" r="20" fill="#4f9d5d" fill-opacity="0.371"/>
  <circle cx="32" cy="32" r="15" fill="#4f9d5d" fill-opacity="0.464"/>
  <circle cx="32" cy="32" r="10" fill="#4f9d5d" fill-opacity="0.557"/>
  <circle cx="32" cy="32"  r="5" fill="#4f9d5d" fill-opacity="0.650"/>
</svg>
